<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mural Digital Acadêmico</title>
</head>
<body>
    <!-- 
        ========================================
        BARRA DE NAVEGAÇÃO PRINCIPAL
        ========================================
        Contém os botões de navegação do dashboard:
        - Login/Perfil (esquerda)
        - Anúncios (visualização do mural - página atual)
        - Criação (ir para criacao.html)
        - Botões reservados para funcionalidades futuras
        - Configurações (direita)
    -->
    <nav>
        <div class="container">
            <div class="menu">
                <!-- Botão de Login/Perfil - Funcionalidade futura -->
                <button class="botao2" onclick="">
                    <img src="imagens/icone_pessoa.png" alt="Login">
                </button>

                <!-- Botão de Anúncios - Página atual (mural) -->
                <button class="botao">
                    <img src="imagens/icone_anuncios.png" alt="Anuncios">
                </button>

                <!-- Botão de Criação - Redireciona para criacao.html -->
                <button class="botao" onclick="window.location.href='criacao.html'">
                    <img src="imagens/icone_lapis.png" alt="Criação">
                </button>

                <!-- Botões reservados para funcionalidades futuras -->
                <button class="botao">
                    <img src="" alt="">
                </button>
                <button class="botao">
                    <img src="" alt="">
                </button>

                <!-- Botão de Configurações - Funcionalidade futura -->
                <button class="botao2">
                    <img src="imagens/icone_config.png" alt="Configurações">
                </button>
            </div>
        </div>
    </nav>

    <!-- 
        ========================================
        ÁREA PRINCIPAL DO MURAL
        ========================================
        Canvas onde os posts são exibidos e gerenciados.
        O script.js controla toda a interatividade:
        - Desenhar posts no canvas
        - Arrastar e soltar posts
        - Remover posts clicando no X
        - Persistência via localStorage
    -->
    <main>
        <!-- Canvas principal - Área de desenho do mural -->
        <canvas id="tela"></canvas>
    </main>

    <!-- 
        ========================================
        SCRIPT PRINCIPAL
        ========================================
        Importa todas as funcionalidades do mural:
        - Gerenciamento de posts
        - Interações com mouse
        - Sistema de localStorage
        - Renderização do canvas
    -->
    <script src="script.js"></script>

</body>
</html>
