<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Criar Post - Mural Digital</title>
</head>
<body>
    <!-- 
        ========================================
        BARRA DE NAVEGAÇÃO
        ========================================
        Mesma estrutura do index.html
        O botão de criação está marcado como "active"
    -->
    <nav>
        <div class="container">
            <div class="menu">
                <!-- Botão de Login/Perfil - Funcionalidade futura -->
                <button class="botao2" onclick="">
                    <img src="imagens/icone_pessoa.png" alt="Perfil">
                </button>

                <!-- Botão de Anúncios - Volta para o mural (index.html) -->
                <button class="botao" onclick="window.location.href='index.html'">
                    <img src="imagens/icone_anuncios.png" alt="Voltar ao Mural">
                </button>

                <!-- Botão de Criação - Página atual (destacado com class "active") -->
                <button class="botao active">
                    <img src="imagens/icone_lapis.png" alt="Criação">
                </button>

                <!-- Botões reservados para funcionalidades futuras -->
                <button class="botao">
                    <img src="" alt="">
                </button>
                <button class="botao">
                    <img src="" alt="">
                </button>

                <!-- Botão de Configurações - Funcionalidade futura -->
                <button class="botao2">
                    <img src="imagens/icone_config.png" alt="Configurações">
                </button>
            </div>
        </div>
    </nav>

    <!-- 
        ========================================
        ÁREA PRINCIPAL - CRIAÇÃO DE POSTS
        ========================================
        Layout dividido em duas seções:
        1. Formulário (esquerda)
        2. Preview do post (direita)
    -->
    <main>
        <div class="criacao-container">
            <!-- 
                ========================================
                SEÇÃO DO FORMULÁRIO
                ========================================
                Contém todos os campos para criar um post:
                - Título (máx. 30 caracteres)
                - Conteúdo (máx. 200 caracteres)
                - Seletor de cor (8 opções)
                - Botões de ação (Cancelar/Criar)
            -->
            <div class="form-section">
                <h1>✏️ Criar Novo Post</h1>
                <p class="subtitle">Preencha as informações abaixo para adicionar um novo post ao mural</p>

                <!-- Formulário de criação de posts -->
                <form id="postForm">
                    <!-- Campo: Título do Post -->
                    <div class="form-group">
                        <label for="titulo">Título do Post</label>
                        <input 
                            type="text" 
                            id="titulo" 
                            name="titulo" 
                            placeholder="Digite o título..."
                            maxlength="30"
                            required
                        >
                        <!-- Contador de caracteres para o título -->
                        <span class="char-counter" id="tituloCounter">0/30</span>
                    </div>

                    <!-- Campo: Conteúdo do Post -->
                    <div class="form-group">
                        <label for="conteudo">Conteúdo</label>
                        <textarea 
                            id="conteudo" 
                            name="conteudo" 
                            placeholder="Digite o conteúdo do post..."
                            maxlength="200"
                            required
                        ></textarea>
                        <!-- Contador de caracteres para o conteúdo -->
                        <span class="char-counter" id="conteudoCounter">0/200</span>
                    </div>

                    <!-- 
                        Campo: Seletor de Cor
                        8 opções de cores predefinidas para o fundo do post
                    -->
                    <div class="form-group">
                        <label for="cor">Cor do Post</label>
                        <div class="color-options">
                            <!-- Cada cor é um radio button oculto + label colorido -->
                            <input type="radio" id="cor1" name="cor" value="#ffe4b5" checked>
                            <label for="cor1" class="color-label" style="background-color: #ffe4b5;"></label>

                            <input type="radio" id="cor2" name="cor" value="#e0f7fa">
                            <label for="cor2" class="color-label" style="background-color: #e0f7fa;"></label>

                            <input type="radio" id="cor3" name="cor" value="#ffccbc">
                            <label for="cor3" class="color-label" style="background-color: #ffccbc;"></label>

                            <input type="radio" id="cor4" name="cor" value="#c8e6c9">
                            <label for="cor4" class="color-label" style="background-color: #c8e6c9;"></label>

                            <input type="radio" id="cor5" name="cor" value="#f8bbd0">
                            <label for="cor5" class="color-label" style="background-color: #f8bbd0;"></label>

                            <input type="radio" id="cor6" name="cor" value="#e1bee7">
                            <label for="cor6" class="color-label" style="background-color: #e1bee7;"></label>

                            <input type="radio" id="cor7" name="cor" value="#fff9c4">
                            <label for="cor7" class="color-label" style="background-color: #fff9c4;"></label>

                            <input type="radio" id="cor8" name="cor" value="#d1c4e9">
                            <label for="cor8" class="color-label" style="background-color: #d1c4e9;"></label>
                        </div>
                    </div>

                    <!-- Botões de ação -->
                    <div class="button-group">
                        <!-- Botão Cancelar - Volta para index.html -->
                        <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
                            ← Cancelar
                        </button>
                        <!-- Botão Criar - Submete o formulário -->
                        <button type="submit" class="btn-primary">
                            Criar Post ✓
                        </button>
                    </div>
                </form>
            </div>

            <!-- 
                ========================================
                SEÇÃO DE PREVIEW
                ========================================
                Mostra em tempo real como o post ficará no mural.
                Atualiza automaticamente conforme o usuário digita.
            -->
            <div class="preview-section">
                <h2>📋 Preview do Post</h2>
                <!-- Estrutura que simula um post do mural -->
                <div class="post-preview" id="preview">
                    <div class="preview-close">×</div>
                    <div class="preview-title">Título do Post</div>
                    <div class="preview-divider"></div>
                    <div class="preview-content">Digite o conteúdo para visualizar...</div>
                </div>
                <p class="preview-note">🎨 Esta é uma prévia de como seu post aparecerá no mural</p>
            </div>
        </div>
    </main>

    <!-- 
        ========================================
        SCRIPT DA PÁGINA DE CRIAÇÃO
        ========================================
        Gerencia todas as interações do formulário:
        - Atualização em tempo real do preview
        - Contadores de caracteres
        - Validação e submissão do formulário
        - Salvamento no localStorage
        - Mensagem de sucesso e redirecionamento
    -->
    <script src="scripts/script2.js"></script>
</body>
</html>
