<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Criação de Notas</title>
</head>
<body>

    <!--NAVEGAÇÃO PRINCIPAL

    é onde está a barra de menu e os botôes 
    principais do Mural, incluindo do de criação-->

        <nav>
            <div class="container">
                <div class="menu">

                    <div class="centroCriacao">
                    <button class="botao">
                        <img src="" alt="">
                    </button>
                    <button class="botao">
                        <img src="" alt="Desenhar">
                    </button>
                    <button class="botao">
                        <img src="" alt="Excluir">
                    </button>
                    <button class="botao">
                        <img src="" alt="">
                    </button>
                    <button class="botaoVoltar" onclick="window.location.href='index.html'">
                        <img src="imagens/icone_voltar.png" alt="Voltar" title="Voltar ao Mural">
                    </button>

                    </div>

                </div>
            </div>
        </nav>

        <!-- PARTE DO HTML PARA A CRIAÇÃO 
                DE BLOCOS DE TEXTO -->

    <main>
        <div class="container_criacao">
            <div class="formulario_criacao">
                
                <!-- CRIAÇÃO DE BLOCOS -->
                <form id="bloco_criacao">
                    <form id="bloco">

                        <div class="grupo_titulo">
                            <h1>Crie uma nova postagem</h1>

                            <br>

                            <!-- TITULO DO BLOCO -->
                            <label for="">Título</label>
                            <input type="text" id="titulo" 
                            title="Dê um título para seu bloco." 
                            placeholder="Título..." maxlength="50" required>

                            <span id="contador_titulo" class="contador">0/50</span>

                        </div>

                        <br>

                        <!-- CONTEÚDO DO BLOCO -->
                        <div class="grupo_conteudo">

                            <label for="">Conteúdo</label>
                            <textarea id="conteudo"  
                            placeholder="Crie o conteúdo do bloco..."
                            maxlength="200" required></textarea>

                            <span id="contador_conteudo" class="contador">0/200</span>

                        </div>

                        <br>

                            <!-- CORES PARA O BLOCO -->
                        <div class="grupo_cores">

                            <label for="cor">Cor do Bloco</label>
                            <div class="opcao_cores">

                            <input type="radio" id="cor1" name="cor" value="#0000ff" checked>
                            <label for="cor1" class="cor_label" 
                            style="background-color: #8b8bee;"></label>

                            <input type="radio" id="cor2" name="cor" value="#b81631" checked>
                            <label for="cor2" class="cor_label" 
                            style="background-color: #e47f8f;"></label>

                            <input type="radio" id="cor3" name="cor" value=" #e6b52e" checked>
                            <label for="cor3" class="cor_label" 
                            style="background-color: #e9d395;"></label>

                            </div>
                        </div>

                        <!-- BOTÃO DE AÇÃO -->
                        <div class="button_grupo">
                                <button type="submit" class="botao_publicar">
                                    Salvar Postagem
                                </button>
                        </div>
                    </form>
            </div>
                
            <br>
            
                <!-- PRÉVIA DA POSTAGEM -->
                <div class="preview">

                    <div class="preview_grupo">
                        <h1>Prévia do Bloco</h1>
                        <div class="preview_bloco" id="preview">
                            <div class="preview_close"></div>
                            <div class="preview_titulo">Título do Bloco...</div>
                            <div class="preview_divisor"></div>
                            <div class="preview_conteudo">Conteúdo do Bloco...</div>
                        </div>
                    </div>
                </div>
            
        </div>
    </main>

    <script src="script2.js" defer></script>

</body>
</html>
