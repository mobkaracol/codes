<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Login</title>
</head>
<body>

    <!-- TELA DE LOGIN DO USUÁRIO
        Alunos, professores e pessoas da escola no geral
        poderão fazer criar perfis para terem acesso ao Mural Digital.

        Somentes pessoas com um código especifico poderão criar blocos e conteúdo
        no geral para Mural. -->

    <form>
        <div id="Login"> <!-- Tela inteira! -->

            <div id="Background"> <!-- fundo -->
                
                <div id="container"> <!-- Parte do quadrado branco -->

                    <label class="login-text"><b>Faça seu login</b></label>

                    <div id="container2"> <!-- Parte das informaçoes no quadrado branco -->

                        <div class="form"> <!-- Parte do login -->

                            <label for="username"><b>Login:</b></label>
                            <input type="text" id="user" placeholder="Digite seu nome...">

                        </div>

                        <div class="form2"> <!-- Parte da senha -->

                            <label for="password"><b>Senha:</b></label>
                            <input type="password" id="password" placeholder="Digite sua senha...">

                        </div>

                    </div>
                        
                    <div id="container3"> <!-- Parte do botão "entrar" -->

                        <button type="button" class="button">Entrar</button>

                    </div>
                    <!-- O rodapé -->
                     <footer><b>Centro Paula Souza | Alfredo dos Barros Santos | 2026</footer>

                </div>

            </div>

        </div>
    </form>
    
</body>
</html>
