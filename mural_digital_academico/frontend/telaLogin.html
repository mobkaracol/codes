<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>

    <!-- TELA DE LOGIN DO USUÁRIO
        Alunos, professores e pessoas da escola no geral
        poderão fazer criar perfis para terem acesso ao Mural Digital.

        Somentes pessoas com um código especifico poderão criar blocos e conteúdo
        no geral para Mural. -->

    <form>
        <div id="login">

            <p>Login:</p>
            <input type="text" placeholder="Digite seu login..." id="login">

            <p>Senha:</p>
            <input type="text" placeholder="Digite sua senha..." id="senha">
            <input type="text" value="Entrar" id="entrar" onclick="">
            <input type="text" value="Cadastrar" id="cadastro" 
            onclick="window.location.href='telaCadastro.html'">

        </div>
    </form>
    
</body>
</html>
