<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">

    <!-- link do google fonts para os icones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <title>Mural Digital Acadêmico</title>
</head>
<body>

    <!-- aplica o tema salvo antes da renderizacao (evita flash) -->
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }
    </script>

    <!-- PARTE PRINCIPAL DO MURAL
         A barra de menu e os botoes principais do Mural
         (incluindo o botao de criacao) sao injetados aqui. -->

    <div id="sidebar-container"></div>
    <script src="scripts/sidebar.js"></script>

    <!-- CANVAS onde os blocos sao desenhados -->
    <main>
        <canvas id="tela"></canvas>
    </main>

    <!-- SCRIPTS DO MURAL -->
    <script src="scripts/script.js" defer></script>
    <script src="scripts/scriptImage.js" defer></script>

</body>
</html>
